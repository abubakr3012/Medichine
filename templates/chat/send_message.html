<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send message Dr {{profile.username}}</title>
</head>
<body>
    {% for i in messages %}
        <b>{{ i.sender.username }}</b>
        <p>{{i.text}}</p>
    {% empty %}
        <p>Сообщение нет</p>
    {% endfor %}
    <form action="" method="post">
        {% csrf_token %}
        <input type="text" placeholder="Напишите сообщение..." name="text">
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
