{% extends "accounts/base.html" %}
{% block title %}Личные сообщения{% endblock %}
{% block main %}
<h1>Личные сообщения</h1>
<p class="muted">Выберите пользователя для перехода в чат.</p>

<section class="panel dm-list">
    {% for i in users %}
        <div class="dm-item">
            <a href="{% url 'send_message' i.id %}">{{ i.username }}</a>
        </div>
    {% empty %}
        <p class="muted">Сообщений нет</p>
    {% endfor %}
</section>
{% endblock %}
