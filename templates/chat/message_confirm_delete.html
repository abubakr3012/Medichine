{% extends "accounts/base.html" %}

{% block title %}Удаление сообщения{% endblock %}

{% block main %}
<section class="page confirm-page">
    <div class="panel confirm-card">
        <p class="eyebrow">Удаление</p>
        <h2>Удалить сообщение?</h2>
        <p class="muted">Это действие нельзя отменить.</p>

        <div class="message-preview">
            <p><strong>{{ object.user.username }}</strong></p>
            <p>{{ object.text }}</p>
        </div>

        <form class="confirm-actions" method="post">
            {% csrf_token %}
            <button class="danger-button" type="submit">Да, удалить</button>
            <a class="button secondary-button" href="{% url 'global_chat' %}">Отмена</a>
        </form>
    </div>
</section>

{% endblock %}
