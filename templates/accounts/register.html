{% extends "accounts/base.html" %}
{% block body_class %}auth-page{% endblock %}
{% block title %}Регистрация{% endblock %}
{% block main %}
<h2>Регистрация</h2>
<form action="" method="post">
    {% csrf_token %}
    <label for="username">Имя пользователя</label>
    <input type="text" placeholder="Введите имя пользователя" name="username" id="username">
    <label for="email">Email</label>
    <input type="email" placeholder="Введите email" name="email" id="email">
    <label for="phone">Телефон</label>
    <input type="tel" placeholder="Введите телефон" name="phone" id="phone" required>
    <label for="age">Возраст</label>
    <input type="number" placeholder="Введите возраст" name="age" id="age" required>
    <label for="city">Город</label>
    <input type="text" placeholder="Введите город" name="city" id="city">
    <label for="password">Пароль</label>
    <div class="password-wrapper">
        <input type="password" placeholder="Введите пароль" name="password" id="password">
        <button type="button" class="toggle-password" onclick="togglePassword('password')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>
    <label for="password2">Подтверждение пароля</label>
    <div class="password-wrapper">
        <input type="password" placeholder="Повторите пароль" name="password2" id="password2">
        <button type="button" class="toggle-password" onclick="togglePassword('password2')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>
    <button type="submit">Создать аккаунт</button>
    {% if error %}
        <p>{{error}}</p>
    {% endif %}
</form>
<div class="auth-link">
    <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
    <p>Уже получили код? <a href="{% url 'confirm' %}">Подтвердить email</a></p>
</div>

<style>
.password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
}

.password-wrapper input {
    flex: 1;
    min-width: 0;
}

.toggle-password {
    background: rgba(102, 126, 234, 0.1);
    border: none;
    cursor: pointer;
    color: #667eea;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: all 0.2s ease;
    flex-shrink: 0;
}

.toggle-password:hover {
    background: rgba(102, 126, 234, 0.2);
    color: #5568d3;
    transform: scale(1.05);
}

.toggle-password:active {
    transform: scale(0.95);
}
</style>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const button = field.parentElement.querySelector('.toggle-password');
    
    if (field.type === 'password') {
        field.type = 'text';
        button.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
        `;
    } else {
        field.type = 'password';
        button.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        `;
    }
}
</script>
{% endblock %}
