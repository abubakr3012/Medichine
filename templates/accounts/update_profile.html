{% extends "accounts/base.html" %}
{% block main %}
<main class="center-page">
    <form class="panel form narrow" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Update profile</h2>
        <p class="muted">Change your account details and photo.</p>
        <label class="field">
            <span>Username</span>
            <input type="text" name="username" value="{{ profile.user.username }}" required>
        </label>
        <label class="field">
            <span>Email</span>
            <input type="email" name="email" value="{{ profile.user.email }}" required>
        </label>
        <label class="field">
            <span>Phone</span>
            <input type="tel" name="phone" value="{{ profile.phone }}">
        </label>
        <label class="field">
            <span>Age</span>
            <input type="number" name="age" value="{{ profile.age }}">
        </label>
        <label class="field">
            <span>Photo</span>
            <input type="file" name="photo" accept="image/*">
        </label>
        <div class="actions">
            <button type="submit">Save changes</button>
            <a href="{% url 'my_profile' %}">Cancel</a>
        </div>
    </form>
</main>
{% endblock %}
