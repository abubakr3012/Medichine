{% extends "accounts/base.html" %}
{% block title %}Панель пациента — {{ user.username }}{% endblock %}
{% block main %}
<div class="dashboard-hero">
    <h1>Добро пожаловать, {{ user.username }}</h1>
    <h2>Панель пациента</h2>
</div>

<section class="panel ai-box">
    <h3>Спросить ИИ о симптомах</h3>
    {% if answer %}
        <div class="ai-answer">
            <p>{{ answer }}</p>
        </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="symptom" placeholder="Что беспокоит?">
        <button type="submit">Спросить ИИ</button>
    </form>
</section>
{% endblock %}
